<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Olpenitz zu Fuß — Stadtrundgang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --brick:#a83f2e;
    --brick-dark:#7a2c20;
    --lake:#28454d;
    --lake-light:#3f6a72;
    --cream:#f2e8d6;
    --paper:#fbf6ec;
    --ink:#271f18;
    --gold:#c69a3c;
    --line: rgba(39,31,24,0.14);
    --radius: 2px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--lake);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(255,255,255,0.04), transparent 45%);
    color:var(--ink);
    font-family:"Source Serif 4", Georgia, serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .stage{
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 18px;
  }
  .card{
    background:var(--paper);
    width:100%;
    max-width:640px;
    height:100%;
    max-height:900px;
    border-radius:var(--radius);
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.06);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
    min-height:0;
  }
  /* --- Route line (signature element) --- */
  .route{
    padding:16px 24px 16px;
    background:var(--cream);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .route-topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .home-link{
    font-family:"IBM Plex Mono", monospace;
    font-size:10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    text-decoration:none;
    color:var(--lake);
    border:1px solid var(--lake);
    padding:5px 10px;
    transition:background .2s, color .2s;
  }
  .home-link:hover{ background:var(--lake); color:var(--paper); }
  .overview-btn{
    font-family:"IBM Plex Mono", monospace;
    font-size:10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:none;
    border:1px solid var(--brick-dark);
    color:var(--brick-dark);
    padding:5px 10px;
    cursor:pointer;
    transition:background .2s, color .2s;
  }
  .overview-btn:hover{ background:var(--brick-dark); color:var(--paper); }
  .route svg{ display:block; width:100%; height:34px; overflow:visible; }
  .route-track{ stroke:rgba(39,31,24,0.18); stroke-width:2; fill:none; }
  .route-fill{ stroke:var(--brick); stroke-width:2; fill:none; transition:stroke-dashoffset .6s cubic-bezier(.65,0,.35,1); }
  .route-dot{ cursor:pointer; }
  .route-dot circle.base{ fill:var(--paper); stroke:rgba(39,31,24,0.35); stroke-width:1.5; transition:all .3s ease; }
  .route-dot.done circle.base{ fill:var(--brick); stroke:var(--brick); }
  .route-dot.current circle.base{ fill:var(--gold); stroke:var(--gold); r:7; }
  .route-dot.current circle.pulse{ opacity:1; }
  .route-dot circle.pulse{ fill:none; stroke:var(--gold); stroke-width:1.5; opacity:0; transform-origin:center; animation:pulse 2.2s ease-out infinite; }
  @keyframes pulse{ 0%{ r:7; opacity:.7;} 100%{ r:16; opacity:0;} }

  .head{
    padding:20px 28px 0;
    flex-shrink:0;
  }
  .eyebrow{
    font-family:"IBM Plex Mono", monospace;
    font-size:11.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--brick-dark);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  h1{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size:clamp(28px,6vw,40px);
    line-height:1.05;
    margin:8px 0 2px;
    color:var(--ink);
  }
  .subtitle{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:500;
    color:var(--lake);
    font-size:16px;
    margin:0 0 14px;
  }
  .body-scroll{
    flex:1;
    overflow-y:auto;
    padding:6px 28px 24px;
  }
  .body-scroll::-webkit-scrollbar{ width:6px; }
  .body-scroll::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  .facts{ margin:6px 0 0; padding:0; list-style:none; }
  .facts li{
    position:relative;
    padding-left:20px;
    margin-bottom:11px;
    font-size:15.5px;
    line-height:1.55;
  }
  .facts li::before{
    content:"";
    position:absolute; left:0; top:9px;
    width:6px; height:6px;
    background:var(--brick);
  }
  .anekdote{
    margin-top:22px;
    background:linear-gradient(180deg, var(--cream), rgba(242,232,214,0.5));
    border-left:3px solid var(--gold);
    padding:16px 18px 18px;
  }
  .anekdote-label{
    font-family:"IBM Plex Mono", monospace;
    font-size:10.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    display:block;
    margin-bottom:6px;
  }
  .anekdote h3{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:600;
    font-size:18px;
    margin:0 0 8px;
    color:var(--brick-dark);
  }
  .anekdote p{
    margin:0;
    font-size:15px;
    line-height:1.62;
    color:var(--ink);
  }
  .mapbox{
    margin-top:20px;
    border:1px solid var(--line);
    background:var(--cream);
  }
  .mapbox iframe{
    width:100%;
    height:180px;
    display:block;
    border:0;
    filter:sepia(8%) saturate(85%);
  }
  .maplinks{
    display:flex;
    gap:1px;
    background:var(--line);
  }
  .maplinks a{
    flex:1;
    text-align:center;
    font-family:"IBM Plex Mono", monospace;
    font-size:11.5px;
    letter-spacing:.05em;
    text-decoration:none;
    color:var(--ink);
    background:var(--cream);
    padding:11px 6px;
    transition:background .2s,color .2s;
  }
  .maplinks a:hover{ background:var(--brick); color:var(--paper); }
  .coords{
    font-family:"IBM Plex Mono", monospace;
    font-size:11px;
    color:var(--lake-light);
    padding:8px 10px 0;
  }
  .compass{
    display:flex;
    flex-wrap:wrap;
    gap:8px 18px;
    margin:16px 0 4px;
  }
  .compass div{
    font-family:"IBM Plex Mono", monospace;
    font-size:12px;
    color:var(--lake);
  }
  .compass b{ color:var(--brick-dark); }

  /* --- Nav --- */
  .nav{
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    border-top:1px solid var(--line);
    background:var(--paper);
  }
  .nav button{
    font-family:"IBM Plex Mono", monospace;
    font-size:12.5px;
    letter-spacing:.06em;
    background:none;
    border:1px solid var(--ink);
    color:var(--ink);
    padding:10px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:background .2s,color .2s;
  }
  .nav button:hover:not(:disabled){ background:var(--ink); color:var(--paper); }
  .nav button:disabled{ opacity:0.25; cursor:default; }
  .nav .counter{
    font-family:"IBM Plex Mono", monospace;
    font-size:12px;
    color:var(--lake-light);
  }

  .slide{
    display:none;
    flex-direction:column;
    flex:1;
    min-height:0;
    animation:fade .35s ease;
  }
  .slide.active{ display:flex; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  @media (max-width:480px){
    .stage{ padding:0; }
    .card{ max-height:none; border-radius:0; }
    .head{ padding:16px 20px 0; }
    .body-scroll{ padding:6px 20px 20px; }
  }

  /* --- Overview overlay --- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(20,16,12,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.open{ display:flex; }
  .overlay-card{
    background:var(--paper);
    width:100%;
    max-width:680px;
    height:100%;
    max-height:820px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .overlay-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .overlay-head h2{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size:20px;
    margin:0;
  }
  .overlay-head button{
    background:none; border:1px solid var(--ink); color:var(--ink);
    width:32px; height:32px; cursor:pointer; font-size:16px;
    font-family:"IBM Plex Mono", monospace;
  }
  .overlay-head button:hover{ background:var(--ink); color:var(--paper); }
  #overviewMap{ flex:1; }
  .overlay-footer{
    padding:12px 20px 16px;
    border-top:1px solid var(--line);
    flex-shrink:0;
  }
  .overlay-footer a{
    display:block;
    text-align:center;
    font-family:"IBM Plex Mono", monospace;
    font-size:12.5px;
    letter-spacing:.05em;
    text-decoration:none;
    background:var(--brick);
    color:var(--paper);
    padding:12px;
    transition:background .2s;
  }
  .overlay-footer a:hover{ background:var(--brick-dark); }
  .leaflet-popup-content{ font-family:"Source Serif 4", serif; font-size:13.5px; }
  .leaflet-popup-content b{ font-family:"Fraunces", serif; }
</style>
</head>
<body>

<div class="stage">
  <div class="card">

    <div class="route">
      <div class="route-topbar">
        <a class="home-link" href="index.html">← Alle Rundgänge</a>
        <button class="overview-btn" onclick="openOverview()">Alle Stationen ↗</button>
      </div>
      <svg viewBox="0 0 600 34" id="routeSvg">
        <path class="route-track" d="M20,17 L580,17"/>
        <path class="route-fill" id="routeFill" d="M20,17 L580,17"/>
        <g id="routeDots"></g>
      </svg>
    </div>

    <div id="slides" style="flex:1; min-height:0; display:flex; flex-direction:column;"></div>

    <div class="nav">
      <button id="prevBtn" onclick="go(-1)">‹ Zurück</button>
      <span class="counter" id="counter"></span>
      <button id="nextBtn" onclick="go(1)">Weiter ›</button>
    </div>

  </div>
</div>

<div class="overlay" id="overviewOverlay">
  <div class="overlay-card">
    <div class="overlay-head">
      <h2>Alle Stationen</h2>
      <button onclick="closeOverview()">✕</button>
    </div>
    <div id="overviewMap"></div>
    <div class="overlay-footer">
      <a id="fullRouteLink" href="#" target="_blank" rel="noopener">Gesamte Route in Google Maps öffnen ↗</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const stations = [
{
  eyebrow: "Einführung",
  meta: "vor dem Start",
  title: "Olpenitz",
  subtitle: "Vom Marinestützpunkt zum Ostseeresort",
  lat: 54.6590456, lng: 10.01985,
  facts: [
    "Erstmals 1285 als \"Vlpænes\" urkundlich erwähnt, war Olpenitz im Mittelalter Krongut des dänischen Königs.",
    "Bevor hier gebaut wurde, lag an dieser Stelle das \"Schleinoor\" – ein naturbelassenes Feuchtgebiet zwischen Schlei und Ostsee.",
    "Zwischen 1959 und 1964 entstand einer von drei großen Ostsee-Stützpunkten der Bundesmarine: Ein Teil des Schleinoors wurde abgetrennt und über eine neue Einfahrt direkt mit der Ostsee verbunden.",
    "Zu Spitzenzeiten waren rund 1.850 Soldaten und 450 zivile Beschäftigte hier stationiert – für Kappeln einer der größten Arbeitgeber der Region.",
    "2004 wurde die Schließung beschlossen, 2006 der Betrieb eingestellt. Seit 2009 entsteht auf dem 150 Hektar großen Gelände das Ostseeresort Olpenitz."
  ],
  compass: [["1285","Erste Erwähnung"], ["1959–64","Bau des Marinestützpunkts"], ["2004","Schließungsbeschluss"], ["2009","Beginn Ostseeresort"]],
  anekdoteLabel: null, anekdoteTitle:null, anekdoteText:null
},
{
  eyebrow: "Station 01",
  meta: "Start · ca. 15 Min",
  title: "Hafenmole & Marina",
  subtitle: "Vom Kriegshafen zur Yachtmarina",
  lat: 54.6590456, lng: 10.01985,
  facts: [
    "Der Marinestützpunkt war kein klassischer Kriegshafen, sondern vor allem ein logistisches Versorgungszentrum für Schnellboote und Minensuchgeschwader der Ostseeflotte.",
    "Das ursprüngliche Hafenbecken, die Mole und die Grundstruktur der Anlage sind bis heute erhalten und prägen die heutige Marina mit rund 300 Liegeplätzen.",
    "Von der Hafenmole reicht der Blick weit auf die Ostsee hinaus – bei klarer Sicht bis zur Küstenlinie von Schleimünde mit ihrem Leuchtfeuer.",
    "Richtung Süden öffnet sich die ruhigere Schlei mit Segelbooten und sanften Uferlinien – ein deutlicher Kontrast zur offenen See."
  ],
  anekdoteLabel: null, anekdoteTitle:null, anekdoteText:null
},
{
  eyebrow: "Station 02",
  meta: "ca. 15 Min",
  title: "Freizeithügel",
  subtitle: "Von der Skihalle zum Aussichtspunkt",
  lat: 54.6627281, lng: 10.0326337,
  facts: [
    "In den ersten Planungen für das Ferienresort war an dieser Stelle tatsächlich eine Skihalle vorgesehen.",
    "Wegen starker Kritik wurde die Idee 2007 verworfen – stattdessen entstand der rund 14,5 Hektar große \"Freizeithügel\" als künstliche Erhebung mit Aussicht über das gesamte Gelände.",
    "Der Hügel ist heute ein beliebter Ausgangspunkt, um die Dimensionen des ehemaligen Marinestützpunkts und die neue Bebauung des Resorts zu überblicken."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Skihalle an der Ostsee?",
  anekdoteText:"So mancher Plan für Olpenitz klingt im Rückblick kurios: Tatsächlich war in den ersten Entwürfen des Ferienresorts eine Skihalle vorgesehen – mitten in der flachen Landschaft zwischen Schlei und Ostsee. Der öffentliche Widerstand gegen dieses Projekt war so groß, dass die Idee schon 2007 wieder verworfen wurde. Aus der geplanten Skihalle wurde der \"Freizeithügel\", eine künstliche Erhebung, die heute weit unspektakulärer, aber dafür passender zur Küstenlandschaft, für Aussicht und Erholung sorgt."
},
{
  eyebrow: "Station 03",
  meta: "Abschluss · ca. 15 Min",
  title: "Schwimmende Häuser",
  subtitle: "Wohnen auf dem Wasser",
  lat: 54.6631157, lng: 10.018946,
  facts: [
    "Seit 2015 entstehen in Olpenitz schwimmende Ferienhäuser, die an eigenen Stegen im ehemaligen Marinehafenbecken liegen.",
    "2016 erstritt die Betreiberfirma vor dem Oberlandesgericht Schleswig deutschlandweit erstmals die Eintragung schwimmender Gebäude ins Grundbuch – damit wurden sie erstmals genauso finanzierbar wie Häuser an Land.",
    "Seit November 2018 liegt hier zudem der Seenotrettungskreuzer \"Fritz Knack\" der Deutschen Gesellschaft zur Rettung Schiffbrüchiger – zuvor war die Station im benachbarten Maasholm beheimatet.",
    "Zwischen modernen Ferienhäusern und Promenaden lassen sich bis heute einzelne Spuren der militärischen Vergangenheit entdecken – ein ungewöhnlicher Kontrast aus Historie und Freizeitwelt."
  ],
  anekdoteLabel: null, anekdoteTitle:null, anekdoteText:null
}
];

let current = 0;
const slidesEl = document.getElementById('slides');
const routeDots = document.getElementById('routeDots');
const routeFill = document.getElementById('routeFill');
const totalLen = 560;

stations.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i===0 ? ' active' : '');
  el.id = 'slide-' + i;
  el.innerHTML = `
    <div class="head">
      <div class="eyebrow"><span>${s.eyebrow}</span><span>${s.meta}</span></div>
      <h1>${s.title}</h1>
      <div class="subtitle">${s.subtitle}</div>
    </div>
    <div class="body-scroll">
      <ul class="facts">${s.facts.map(f=>`<li>${f}</li>`).join('')}</ul>
      ${s.compass ? `<div class="compass">${s.compass.map(c=>`<div><b>${c[0]}</b> ${c[1]}</div>`).join('')}</div>` : ''}
      ${s.lat ? `
      <div class="mapbox">
        <div class="coords">${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</div>
        <iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${s.lng-0.004}%2C${s.lat-0.0025}%2C${s.lng+0.004}%2C${s.lat+0.0025}&layer=mapnik&marker=${s.lat}%2C${s.lng}"></iframe>
        <div class="maplinks">
          <a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener">Google Maps ↗</a>
          <a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=walking" target="_blank" rel="noopener">Navigation starten ↗</a>
        </div>
      </div>` : ''}
      ${s.anekdoteText ? `
      <div class="anekdote">
        <span class="anekdote-label">${s.anekdoteLabel}</span>
        <h3>${s.anekdoteTitle}</h3>
        <p>${s.anekdoteText}</p>
      </div>` : ''}
    </div>
  `;
  slidesEl.appendChild(el);

  const x = 20 + (i * (totalLen / (stations.length - 1)));
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','route-dot');
  g.setAttribute('data-i', i);
  g.innerHTML = `<circle class="pulse" cx="${x}" cy="17" r="7"></circle><circle class="base" cx="${x}" cy="17" r="5"></circle>`;
  g.addEventListener('click', () => { current = i; render(); });
  routeDots.appendChild(g);
});

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=> el.classList.toggle('active', i===current));
  document.querySelectorAll('.route-dot').forEach((el,i)=>{
    el.classList.toggle('done', i < current);
    el.classList.toggle('current', i === current);
  });
  const x = 20 + (current * (totalLen / (stations.length - 1)));
  routeFill.setAttribute('d', `M20,17 L${x},17`);
  document.getElementById('counter').textContent = (current+1) + ' / ' + stations.length;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === stations.length - 1;
  document.querySelector('.body-scroll:not([style*="display: none"])');
  const active = document.querySelector('.slide.active .body-scroll');
  if(active) active.scrollTop = 0;
}
function go(dir){
  const next = current + dir;
  if(next < 0 || next > stations.length - 1) return;
  current = next;
  render();
}
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') go(1);
  if(e.key === 'ArrowLeft') go(-1);
});
let touchX = null;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  if(touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
  touchX = null;
});
render();

/* --- Overview map with all stations --- */
let overviewMap = null;
const routeStations = stations.filter(s => s.eyebrow.startsWith('Station'));

function openOverview(){
  document.getElementById('overviewOverlay').classList.add('open');
  if(!overviewMap){
    overviewMap = L.map('overviewMap');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap-Mitwirkende',
      maxZoom: 19
    }).addTo(overviewMap);

    const latlngs = routeStations.map(s => [s.lat, s.lng]);
    const brickIcon = (num) => L.divIcon({
      className: '',
      html: `<div style="background:#a83f2e;color:#fbf6ec;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;border:2px solid #fbf6ec;box-shadow:0 2px 6px rgba(0,0,0,0.35);">${num}</div>`,
      iconSize: [26,26],
      iconAnchor: [13,13]
    });

    routeStations.forEach((s, i) => {
      L.marker([s.lat, s.lng], { icon: brickIcon(i+1) })
        .addTo(overviewMap)
        .bindPopup(`<b>${i+1}. ${s.title}</b><br>${s.subtitle}`);
    });

    L.polyline(latlngs, { color:'#a83f2e', weight:3, dashArray:'6 6' }).addTo(overviewMap);
    overviewMap.fitBounds(L.latLngBounds(latlngs), { padding:[36,36] });

    const origin = routeStations[0];
    const dest = routeStations[routeStations.length - 1];
    const waypoints = routeStations.slice(1, -1).map(s => `${s.lat},${s.lng}`).join('|');
    const url = `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lng}&destination=${dest.lat},${dest.lng}&waypoints=${waypoints}&travelmode=walking`;
    document.getElementById('fullRouteLink').href = url;
  } else {
    setTimeout(() => overviewMap.invalidateSize(), 50);
  }
}
function closeOverview(){
  document.getElementById('overviewOverlay').classList.remove('open');
}
document.getElementById('overviewOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'overviewOverlay') closeOverview();
});
</script>
</body>
