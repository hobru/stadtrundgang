<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Schwerin zu Fuß — Stadtrundgang</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --brick:#a83f2e;
    --brick-dark:#7a2c20;
    --lake:#28454d;
    --lake-light:#3f6a72;
    --cream:#f2e8d6;
    --paper:#fbf6ec;
    --ink:#271f18;
    --gold:#c69a3c;
    --line: rgba(39,31,24,0.14);
    --radius: 2px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--lake);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(255,255,255,0.04), transparent 45%);
    color:var(--ink);
    font-family:"Source Serif 4", Georgia, serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  .stage{
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px 18px;
  }
  .card{
    background:var(--paper);
    width:100%;
    max-width:640px;
    height:100%;
    max-height:900px;
    border-radius:var(--radius);
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.06);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  /* --- Route line (signature element) --- */
  .route{
    padding:22px 24px 16px;
    background:var(--cream);
    border-bottom:1px solid var(--line);
    flex-shrink:0;
    position:relative;
  }
  .overview-btn{
    position:absolute;
    top:20px; right:22px;
    font-family:"IBM Plex Mono", monospace;
    font-size:10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    background:none;
    border:1px solid var(--brick-dark);
    color:var(--brick-dark);
    padding:5px 10px;
    cursor:pointer;
    transition:background .2s, color .2s;
  }
  .overview-btn:hover{ background:var(--brick-dark); color:var(--paper); }
  .route svg{ display:block; width:100%; height:34px; overflow:visible; }
  .route-track{ stroke:rgba(39,31,24,0.18); stroke-width:2; fill:none; }
  .route-fill{ stroke:var(--brick); stroke-width:2; fill:none; transition:stroke-dashoffset .6s cubic-bezier(.65,0,.35,1); }
  .route-dot{ cursor:pointer; }
  .route-dot circle.base{ fill:var(--paper); stroke:rgba(39,31,24,0.35); stroke-width:1.5; transition:all .3s ease; }
  .route-dot.done circle.base{ fill:var(--brick); stroke:var(--brick); }
  .route-dot.current circle.base{ fill:var(--gold); stroke:var(--gold); r:7; }
  .route-dot.current circle.pulse{ opacity:1; }
  .route-dot circle.pulse{ fill:none; stroke:var(--gold); stroke-width:1.5; opacity:0; transform-origin:center; animation:pulse 2.2s ease-out infinite; }
  @keyframes pulse{ 0%{ r:7; opacity:.7;} 100%{ r:16; opacity:0;} }

  .head{
    padding:20px 28px 0;
    flex-shrink:0;
  }
  .eyebrow{
    font-family:"IBM Plex Mono", monospace;
    font-size:11.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--brick-dark);
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  h1{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size:clamp(28px,6vw,40px);
    line-height:1.05;
    margin:8px 0 2px;
    color:var(--ink);
  }
  .subtitle{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:500;
    color:var(--lake);
    font-size:16px;
    margin:0 0 14px;
  }
  .body-scroll{
    flex:1;
    overflow-y:auto;
    padding:6px 28px 24px;
  }
  .body-scroll::-webkit-scrollbar{ width:6px; }
  .body-scroll::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  .facts{ margin:6px 0 0; padding:0; list-style:none; }
  .facts li{
    position:relative;
    padding-left:20px;
    margin-bottom:11px;
    font-size:15.5px;
    line-height:1.55;
  }
  .facts li::before{
    content:"";
    position:absolute; left:0; top:9px;
    width:6px; height:6px;
    background:var(--brick);
  }
  .anekdote{
    margin-top:22px;
    background:linear-gradient(180deg, var(--cream), rgba(242,232,214,0.5));
    border-left:3px solid var(--gold);
    padding:16px 18px 18px;
  }
  .anekdote-label{
    font-family:"IBM Plex Mono", monospace;
    font-size:10.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--gold);
    display:block;
    margin-bottom:6px;
  }
  .anekdote h3{
    font-family:"Fraunces", serif;
    font-style:italic;
    font-weight:600;
    font-size:18px;
    margin:0 0 8px;
    color:var(--brick-dark);
  }
  .anekdote p{
    margin:0;
    font-size:15px;
    line-height:1.62;
    color:var(--ink);
  }
  .mapbox{
    margin-top:20px;
    border:1px solid var(--line);
    background:var(--cream);
  }
  .mapbox iframe{
    width:100%;
    height:180px;
    display:block;
    border:0;
    filter:sepia(8%) saturate(85%);
  }
  .maplinks{
    display:flex;
    gap:1px;
    background:var(--line);
  }
  .maplinks a{
    flex:1;
    text-align:center;
    font-family:"IBM Plex Mono", monospace;
    font-size:11.5px;
    letter-spacing:.05em;
    text-decoration:none;
    color:var(--ink);
    background:var(--cream);
    padding:11px 6px;
    transition:background .2s,color .2s;
  }
  .maplinks a:hover{ background:var(--brick); color:var(--paper); }
  .coords{
    font-family:"IBM Plex Mono", monospace;
    font-size:11px;
    color:var(--lake-light);
    padding:8px 10px 0;
  }
  .compass{
    display:flex;
    flex-wrap:wrap;
    gap:8px 18px;
    margin:16px 0 4px;
  }
  .compass div{
    font-family:"IBM Plex Mono", monospace;
    font-size:12px;
    color:var(--lake);
  }
  .compass b{ color:var(--brick-dark); }

  /* --- Nav --- */
  .nav{
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    border-top:1px solid var(--line);
    background:var(--paper);
  }
  .nav button{
    font-family:"IBM Plex Mono", monospace;
    font-size:12.5px;
    letter-spacing:.06em;
    background:none;
    border:1px solid var(--ink);
    color:var(--ink);
    padding:10px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:background .2s,color .2s;
  }
  .nav button:hover:not(:disabled){ background:var(--ink); color:var(--paper); }
  .nav button:disabled{ opacity:0.25; cursor:default; }
  .nav .counter{
    font-family:"IBM Plex Mono", monospace;
    font-size:12px;
    color:var(--lake-light);
  }

  .slide{
    display:none;
    flex-direction:column;
    height:100%;
    animation:fade .35s ease;
  }
  .slide.active{ display:flex; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  @media (max-width:480px){
    .stage{ padding:0; }
    .card{ max-height:none; border-radius:0; }
    .head{ padding:16px 20px 0; }
    .body-scroll{ padding:6px 20px 20px; }
  }

  /* --- Overview overlay --- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(20,16,12,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.open{ display:flex; }
  .overlay-card{
    background:var(--paper);
    width:100%;
    max-width:680px;
    height:100%;
    max-height:820px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .overlay-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px 20px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .overlay-head h2{
    font-family:"Fraunces", serif;
    font-weight:600;
    font-size:20px;
    margin:0;
  }
  .overlay-head button{
    background:none; border:1px solid var(--ink); color:var(--ink);
    width:32px; height:32px; cursor:pointer; font-size:16px;
    font-family:"IBM Plex Mono", monospace;
  }
  .overlay-head button:hover{ background:var(--ink); color:var(--paper); }
  #overviewMap{ flex:1; }
  .overlay-footer{
    padding:12px 20px 16px;
    border-top:1px solid var(--line);
    flex-shrink:0;
  }
  .overlay-footer a{
    display:block;
    text-align:center;
    font-family:"IBM Plex Mono", monospace;
    font-size:12.5px;
    letter-spacing:.05em;
    text-decoration:none;
    background:var(--brick);
    color:var(--paper);
    padding:12px;
    transition:background .2s;
  }
  .overlay-footer a:hover{ background:var(--brick-dark); }
  .leaflet-popup-content{ font-family:"Source Serif 4", serif; font-size:13.5px; }
  .leaflet-popup-content b{ font-family:"Fraunces", serif; }
</style>
</head>
<body>

<div class="stage">
  <div class="card">

    <div class="route">
      <button class="overview-btn" onclick="openOverview()">Alle Stationen ↗</button>
      <svg viewBox="0 0 600 34" id="routeSvg">
        <path class="route-track" d="M20,17 L580,17"/>
        <path class="route-fill" id="routeFill" d="M20,17 L580,17"/>
        <g id="routeDots"></g>
      </svg>
    </div>

    <div id="slides"></div>

    <div class="nav">
      <button id="prevBtn" onclick="go(-1)">‹ Zurück</button>
      <span class="counter" id="counter"></span>
      <button id="nextBtn" onclick="go(1)">Weiter ›</button>
    </div>

  </div>
</div>

<div class="overlay" id="overviewOverlay">
  <div class="overlay-card">
    <div class="overlay-head">
      <h2>Alle Stationen</h2>
      <button onclick="closeOverview()">✕</button>
    </div>
    <div id="overviewMap"></div>
    <div class="overlay-footer">
      <a id="fullRouteLink" href="#" target="_blank" rel="noopener">Gesamte Route in Google Maps öffnen ↗</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const stations = [
{
  eyebrow: "Einführung",
  meta: "vor dem Start",
  title: "Schwerin",
  subtitle: "Stadt der sieben Seen",
  lat: 53.6320975, lng: 11.4125281,
  facts: [
    "Gegründet 1160 von Heinrich dem Löwen auf einer Insel, die zuvor eine slawische Burg der Obodriten trug – Schwerin ist damit eine der ältesten Städte Norddeutschlands.",
    "Ab 1358 Residenz der Herzöge von Mecklenburg, später Mecklenburg-Schwerin – über sechs Jahrhunderte lang Sitz von Hof und Macht.",
    "Ihre heutige, sehr geschlossene historistische Gestalt verdankt die Stadt vor allem Großherzog Friedrich Franz II. und seinem Baumeister Georg Adolph Demmler, die im 19. Jahrhundert Schloss, Museum, Theater und Rathausfassade neu- bzw. umbauten.",
    "Im Zweiten Weltkrieg blieb die Altstadt weitgehend von Zerstörung verschont – deshalb ist das historische Stadtbild bis heute ungewöhnlich vollständig erhalten.",
    "Nach 1990 wurde Schwerin Landeshauptstadt von Mecklenburg-Vorpommern; seit 2024 ist das gesamte Residenzensemble UNESCO-Welterbe.",
    "Die Stadt liegt zwischen sieben Seen, umgeben von noch deutlich mehr Gewässern – Wasser ist in Schwerin nie weit entfernt und prägt jede Blickachse."
  ],
  compass: [["1160","Stadtgründung"], ["1358","Residenzstadt"], ["1857","Schloss vollendet"], ["1990","Landeshauptstadt"], ["2024","UNESCO-Welterbe"]],
  anekdoteLabel: null, anekdoteTitle:null, anekdoteText:null
},
{
  eyebrow: "Station 01",
  meta: "Start · ca. 10 Min",
  title: "Pfaffenteich",
  subtitle: "Die Binnenalster Schwerins",
  lat: 53.6320975, lng: 11.4125281,
  facts: [
    "Künstlicher See aus dem 12. Jahrhundert, ursprünglich als Mühlenteich der bischöflichen (\"Pfaffen\"-)Mühle angelegt – daher der Name.",
    "An der Südseite steht das Arsenal (1840er, Demmler) im Tudorstil, heute Sitz des Innenministeriums; gegenüber die ehemalige Hauptpost aus rotem Backstein.",
    "Im Sommer verkehrt die kleine Fähre \"Petermännchen\" über den Teich – eine der kürzesten Fährlinien Deutschlands.",
    "Guter Ausgangspunkt, um die Wasserlage der Stadt zu erklären: Schwerin ist von zwölf Seen umgeben."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Der See, der fast verschwunden wäre",
  anekdoteText:"Mitte des 19. Jahrhunderts war der Pfaffenteich alles andere als ein Schmuckstück: Er diente als Abwassergrube, stank im Sommer erbärmlich, und es gab ernsthafte Überlegungen, ihn einfach zuzuschütten, um Bauland zu gewinnen. Ausgerechnet Hofbaumeister Demmler setzte sich für den Erhalt ein – der See wurde stattdessen mit gemauerten Ufern eingefasst und zur eleganten Wasserfläche mitten in der Stadt. Heute undenkbar, dass die \"Binnenalster Schwerins\" beinahe ein Parkplatz-Vorläufer geworden wäre."
},
{
  eyebrow: "Station 02",
  meta: "ca. 10 Min",
  title: "Marktplatz & Rathaus",
  subtitle: "Herz der Altstadt seit 1160",
  lat: 53.6289399, lng: 11.4154882,
  facts: [
    "Zentrum der Altstadt seit der Stadtgründung durch Heinrich den Löwen.",
    "Altstädtisches Rathaus: Kern aus dem Mittelalter (seit 1338 an dieser Stelle), die heutige Tudor-Fassade stammt von Demmler (1835) – dahinter verbergen sich vier ältere Giebelhäuser.",
    "Das klassizistische \"Säulengebäude\" (1783–85) an der Nordseite beherbergt heute Café-Betrieb und die Tourist-Information.",
    "Das Löwendenkmal (1995, Peter Lenk) erinnert an den Stadtgründer – mit augenzwinkernden, teils derben Reliefszenen."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Der Löwe, der die Stadt spaltete",
  anekdoteText:"Als der Bodensee-Bildhauer Peter Lenk 1995 sein Löwendenkmal enthüllte, gab es in Schwerin einen handfesten Skandal. Lenk ist für seine satirischen, derben Skulpturen berüchtigt – und auch hier zeigen die Bronzereliefs den Stadtgründer nicht heldenhaft-erhaben, sondern mit nackten Hinterteilen, Spott und drastischen Szenen aus der wenig ruhmreichen Eroberungsgeschichte. Leserbriefe, empörte Bürger, hitzige Debatten im Stadtrat – das volle Programm. Heute ist der freche Löwe längst ein Liebling der Stadtführer: Kaum ein Denkmal bringt Besucher so zuverlässig zum Schmunzeln."
},
{
  eyebrow: "Station 03",
  meta: "ca. 15 Min",
  title: "Dom St. Marien",
  subtitle: "Backsteingotik von europäischem Rang",
  lat: 53.6295519, lng: 11.4146762,
  facts: [
    "Baubeginn 1270, Weihe 1416 – eines der bedeutendsten Bauwerke der norddeutschen Backsteingotik, Station der Europäischen Route der Backsteingotik.",
    "Der 117,5 m hohe Turm ist neugotisch (vollendet 1889) und der höchste Kirchturm Ostdeutschlands; Aufstieg über ca. 220 Stufen möglich.",
    "Innen sehenswert: gotischer Kreuzaltar (um 1440), mittelalterliche Bronzetaufe, Grabplatten der Grafen von Schwerin, Ladegast-Orgel.",
    "Eintritt ins Kirchenschiff ist frei; für den Turmaufstieg fällt eine kleine Gebühr an."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Ein Tropfen Blut macht Schwerin reich",
  anekdoteText:"Der Legende nach brachte Graf Heinrich von Schwerin 1222 von einem Kreuzzug eine kostbare Reliquie mit: einen Jaspis, in dem ein Tropfen vom Blut Christi eingeschlossen sein sollte. Die Wirkung war enorm – Schwerin wurde über Nacht zum Wallfahrtsort, Pilger strömten aus ganz Norddeutschland herbei, und mit ihren Spenden ließ sich der prächtige gotische Neubau des Doms überhaupt erst finanzieren. Ein einziger, angeblicher Blutstropfen hat also eine der größten Backsteinkirchen des Nordens bezahlt."
},
{
  eyebrow: "Station 04",
  meta: "ca. 10 Min",
  title: "Alter Garten",
  subtitle: "Bühne von Hof und Bürgertum",
  lat: 53.626512, lng: 11.4168562,
  facts: [
    "Einer der schönsten Plätze Norddeutschlands, historisch herzoglicher Küchengarten, später Paradeplatz.",
    "Mecklenburgisches Staatstheater (Neorenaissance/Neobarock, 1886) und Staatliches Museum (klassizistische Galerie, 1882) rahmen den Platz.",
    "Das Museum besitzt eine bedeutende Sammlung niederländischer Malerei sowie eine der weltweit größten Marcel-Duchamp-Sammlungen.",
    "Bester Fotospot des Rundgangs: Blick über den Platz direkt auf das Schloss."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Die Bühne der Revolution",
  anekdoteText:"Der Platz war jahrhundertelang Kulisse für Paraden und höfische Feste – doch seine bewegendste Stunde erlebte er am 23. Oktober 1989: Zehntausende Schweriner versammelten sich hier zur ersten großen Demonstration der Friedlichen Revolution in der Stadt, der größten Menschenansammlung, die der Alte Garten je gesehen hatte. Ausgerechnet dort, wo einst Großherzöge ihre Truppen abnahmen, forderten die Bürger Meinungsfreiheit und Reformen – vom Paradeplatz des Hofes zum Platz des Volkes."
},
{
  eyebrow: "Station 05",
  meta: "ca. 15 Min",
  title: "Schweriner Schloss",
  subtitle: "Märchenschloss und Parlamentssitz",
  lat: 53.6247045, lng: 11.4182424,
  facts: [
    "Wahrzeichen der Stadt, seit 2024 Teil des UNESCO-Welterbes \"Residenzensemble Schwerin\".",
    "Steht auf der Insel der slawischen Burg von 973 – über 1.000 Jahre durchgehende Herrschaftsgeschichte an einem Ort.",
    "Heutige Gestalt 1845–1857 unter Friedrich Franz II. (Demmler, Stüler u. a.), als Vorbild diente das Loire-Schloss Chambord.",
    "Seit 1990 Sitz des Landtags von Mecklenburg-Vorpommern – Parlament im Märchenschloss.",
    "Innenbesuch (Thronsaal, Ahnengalerie) Di–So 10–18 Uhr, montags geschlossen – als Verlängerung des Rundgangs 60–90 Min extra einplanen."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Wie das Petermännchen Wallenstein vertrieb",
  anekdoteText:"Die berühmteste Schlosslegende: Als der gefürchtete Feldherr Wallenstein im Dreißigjährigen Krieg zum Herzog von Mecklenburg ernannt wurde und im Schweriner Schloss nächtigte, soll ihm das Petermännchen – der kleine Schlossgeist mit Laterne und Schlüsselbund – keine ruhige Minute gegönnt haben. Die ganze Nacht habe es gepoltert und gespukt, bis der sonst so furchtlose Feldherr entnervt das Weite suchte. Die Schweriner erzählen bis heute mit Stolz: Was ganze Armeen nicht schafften, erledigte ihr Hausgeist in einer Nacht."
},
{
  eyebrow: "Station 06",
  meta: "Abschluss · ca. 10 Min",
  title: "Burggarten",
  subtitle: "Grotte, Orangerie und Seeblick",
  lat: 53.6243763, lng: 11.4201671,
  facts: [
    "Terrassenförmig angelegter Garten auf der Schlossinsel mit Orangerie, Wandelgängen und künstlicher Muschelgrotte (19. Jh.).",
    "Herrliche Ausblicke auf den Schweriner See – idealer, ruhiger Ausklang des Rundgangs.",
    "Wer noch Zeit hat: über die Brücke in den barocken Schlossgarten mit Kreuzkanal-Achse (Legeay, 18. Jh., später von Lenné umgestaltet) – verlängert die Tour um 20–30 Minuten."
  ],
  anekdoteLabel:"Anekdote", anekdoteTitle:"Künstliche Ruinen für echte Romantiker",
  anekdoteText:"Die Muschelgrotte am Ufer wirkt wie ein uraltes, verwittertes Gemäuer – und genau das war der Trick: Sie wurde im 18. Jahrhundert absichtlich als \"künstliche Ruine\" angelegt, ganz nach der Mode der Zeit, in der sich die Hofgesellschaft malerischen Verfall in den Garten baute, um dort empfindsame Stunden zu verbringen. Man ließ sich in Schäferkostümen nieder und schwärmte – Inszenierung statt Geschichte. Heute ist die Grotte einer der ältesten erhaltenen Teile der Anlage und der schönste Punkt, um den Rundgang mit Blick auf den See ausklingen zu lassen."
}
];

let current = 0;
const slidesEl = document.getElementById('slides');
const routeDots = document.getElementById('routeDots');
const routeFill = document.getElementById('routeFill');
const totalLen = 560;

stations.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'slide' + (i===0 ? ' active' : '');
  el.id = 'slide-' + i;
  el.innerHTML = `
    <div class="head">
      <div class="eyebrow"><span>${s.eyebrow}</span><span>${s.meta}</span></div>
      <h1>${s.title}</h1>
      <div class="subtitle">${s.subtitle}</div>
    </div>
    <div class="body-scroll">
      <ul class="facts">${s.facts.map(f=>`<li>${f}</li>`).join('')}</ul>
      ${s.compass ? `<div class="compass">${s.compass.map(c=>`<div><b>${c[0]}</b> ${c[1]}</div>`).join('')}</div>` : ''}
      ${s.lat ? `
      <div class="mapbox">
        <div class="coords">${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</div>
        <iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${s.lng-0.004}%2C${s.lat-0.0025}%2C${s.lng+0.004}%2C${s.lat+0.0025}&layer=mapnik&marker=${s.lat}%2C${s.lng}"></iframe>
        <div class="maplinks">
          <a href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener">Google Maps ↗</a>
          <a href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=walking" target="_blank" rel="noopener">Navigation starten ↗</a>
        </div>
      </div>` : ''}
      ${s.anekdoteText ? `
      <div class="anekdote">
        <span class="anekdote-label">${s.anekdoteLabel}</span>
        <h3>${s.anekdoteTitle}</h3>
        <p>${s.anekdoteText}</p>
      </div>` : ''}
    </div>
  `;
  slidesEl.appendChild(el);

  const x = 20 + (i * (totalLen / (stations.length - 1)));
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','route-dot');
  g.setAttribute('data-i', i);
  g.innerHTML = `<circle class="pulse" cx="${x}" cy="17" r="7"></circle><circle class="base" cx="${x}" cy="17" r="5"></circle>`;
  g.addEventListener('click', () => { current = i; render(); });
  routeDots.appendChild(g);
});

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=> el.classList.toggle('active', i===current));
  document.querySelectorAll('.route-dot').forEach((el,i)=>{
    el.classList.toggle('done', i < current);
    el.classList.toggle('current', i === current);
  });
  const x = 20 + (current * (totalLen / (stations.length - 1)));
  routeFill.setAttribute('d', `M20,17 L${x},17`);
  document.getElementById('counter').textContent = (current+1) + ' / ' + stations.length;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === stations.length - 1;
  document.querySelector('.body-scroll:not([style*="display: none"])');
  const active = document.querySelector('.slide.active .body-scroll');
  if(active) active.scrollTop = 0;
}
function go(dir){
  const next = current + dir;
  if(next < 0 || next > stations.length - 1) return;
  current = next;
  render();
}
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') go(1);
  if(e.key === 'ArrowLeft') go(-1);
});
let touchX = null;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  if(touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
  touchX = null;
});
render();

/* --- Overview map with all stations --- */
let overviewMap = null;
const routeStations = stations.filter(s => s.eyebrow.startsWith('Station'));

function openOverview(){
  document.getElementById('overviewOverlay').classList.add('open');
  if(!overviewMap){
    overviewMap = L.map('overviewMap');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap-Mitwirkende',
      maxZoom: 19
    }).addTo(overviewMap);

    const latlngs = routeStations.map(s => [s.lat, s.lng]);
    const brickIcon = (num) => L.divIcon({
      className: '',
      html: `<div style="background:#a83f2e;color:#fbf6ec;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;border:2px solid #fbf6ec;box-shadow:0 2px 6px rgba(0,0,0,0.35);">${num}</div>`,
      iconSize: [26,26],
      iconAnchor: [13,13]
    });

    routeStations.forEach((s, i) => {
      L.marker([s.lat, s.lng], { icon: brickIcon(i+1) })
        .addTo(overviewMap)
        .bindPopup(`<b>${i+1}. ${s.title}</b><br>${s.subtitle}`);
    });

    L.polyline(latlngs, { color:'#a83f2e', weight:3, dashArray:'6 6' }).addTo(overviewMap);
    overviewMap.fitBounds(L.latLngBounds(latlngs), { padding:[36,36] });

    const origin = routeStations[0];
    const dest = routeStations[routeStations.length - 1];
    const waypoints = routeStations.slice(1, -1).map(s => `${s.lat},${s.lng}`).join('|');
    const url = `https://www.google.com/maps/dir/?api=1&origin=${origin.lat},${origin.lng}&destination=${dest.lat},${dest.lng}&waypoints=${waypoints}&travelmode=walking`;
    document.getElementById('fullRouteLink').href = url;
  } else {
    setTimeout(() => overviewMap.invalidateSize(), 50);
  }
}
function closeOverview(){
  document.getElementById('overviewOverlay').classList.remove('open');
}
document.getElementById('overviewOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'overviewOverlay') closeOverview();
});
</script>
</body>
</html>
